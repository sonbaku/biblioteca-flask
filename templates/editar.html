<!DOCTYPE html>
<html>

<head>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<title>Editar Libro</title>
</head>

<body>

<div class="contenedor">

<h2>Editar Libro</h2>

<form action="/actualizar/{{ libro[0] }}" method="POST">

<label>Titulo</label>
<br>
<input type="text" name="titulo" value="{{ libro[1] }}" required>

<br><br>

<label>Autor</label>
<br>
<input type="text" name="autor" value="{{ libro[2] }}" required>

<br><br>

<label>Año</label>
<br>
<input type="number" name="anio" value="{{ libro[3] }}" min="1000" max="2100" required>

<br><br>

<label>Precio</label>
<br>
<input type="number" name="precio" value="{{ libro[4] }}" min="0" max="1000000" step="0.01" required>

<br><br>

<button type="submit">Actualizar</button>

</form>

</div>

</body>
</html>
