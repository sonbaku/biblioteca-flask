<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<title>Editar Libro</title>
</head>

<body>

<h2>Editar Libro</h2>

<form action="/actualizar/{{ libro[0] }}" method="POST">

<label>Titulo</label>
<br>
<input type="text" name="titulo" value="{{ libro[1] }}" required>

<br><br>

<label>Autor</label>
<br>
<input type="text" name="autor" value="{{ libro[2] }}" required>

<br><br>

<label>Año</label>
<br>
<input type="number" name="anio" value="{{ libro[3] }}" required>

<br><br>

<label>Precio</label>
<br>
<input type="number" step="0.01" name="precio" value="{{ libro[4] }}" required>

<br><br>

<button type="submit">Actualizar</button>

</form>

</body>
</html>
