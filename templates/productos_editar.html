<!DOCTYPE html>
<html>
<head>
  <title>Editar Producto</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="header">
  <h1>Biblioteca</h1>
  <a class="logout" href="/logout">Cerrar sesión</a>
</div>

<div class="container">
  <h2>Editar Producto</h2>

  <form action="/producto/actualizar/{{ producto._id }}" method="POST">
    <input type="text"   name="nombre"    value="{{ producto.nombre }}"    required><br><br>
    <input type="text"   name="categoria" value="{{ producto.categoria }}" required><br><br>
    <input type="number" name="precio"    value="{{ producto.precio }}"    step="0.01" min="0" required><br><br>
    <input type="number" name="stock"     value="{{ producto.stock }}"     min="0" required><br><br>
    <button type="submit">Actualizar</button>
  </form>

  <br><a href="/productos">Cancelar</a>
</div>

</body>
</html>
